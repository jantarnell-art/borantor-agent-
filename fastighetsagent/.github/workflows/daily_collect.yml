name: Daglig insamling av fastighetsaffärer

on:
  schedule:
    - cron: "30 5 * * 1-5"   # 07:30 CET (sommar UTC+2)
    - cron: "30 6 * * 1-5"   # 07:30 CET (vinter UTC+1)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installera beroenden
        run: pip install -r requirements.txt

      - name: Dekomprimera databas
        run: |
          mkdir -p data
          if [ -f data/fastigheter.db.gz ]; then
            gunzip -c data/fastigheter.db.gz > data/fastigheter.db
            echo "Databas dekomprimerad: $(du -h data/fastigheter.db | cut -f1)"
          fi

      - name: Samla in och extrahera affärer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py collect
        continue-on-error: true

      - name: Visa statistik
        run: python main.py stats
        continue-on-error: true

      - name: Komprimera databas
        run: |
          if [ -f data/fastigheter.db ]; then
            gzip -c data/fastigheter.db > data/fastigheter.db.gz
            echo "Komprimerad: $(du -h data/fastigheter.db.gz | cut -f1)"
          fi

      - name: Commit och push data
        run: |
          git config user.name "Fastighetsagent"
          git config user.email "bot@fastighetsagent"
          git add data/fastigheter.db.gz || true
          git diff --staged --quiet || git commit -m "Data: daglig insamling $(date +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push origin main
