name: Daglig ränteinhämtning

on:
  schedule:
    - cron: '0 5 * * *'   # 07:00 sommartid (CEST = UTC+2)
    - cron: '0 6 * * *'   # 07:00 vintertid (CET  = UTC+1)
  workflow_dispatch:       # Kan köras manuellt från GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    name: Samla in räntor
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checka ut repot
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Sätt upp Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Installera Python-beroenden
        run: pip install -r requirements.txt

      # ── Playwright + Chromium (krävs för JS-renderade banksidor) ─────────────
      - name: Installera Playwright Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      # ── Återställ databas ─────────────────────────────────────────────────────
      - name: Packa upp databas
        run: |
          if [ -f data/borantor.db.gz ]; then
            gunzip -k data/borantor.db.gz
            echo "Databas återställd"
          else
            echo "Ingen befintlig databas – startar från scratch"
          fi

      # ── Samla in räntor ───────────────────────────────────────────────────────
      - name: Testa nätverksåtkomst
        run: |
          TODAY=$(date +%Y-%m-%d)
          MONTH_AGO=$(date -d '30 days ago' +%Y-%m-%d)
          echo "=== Testar Riksbanken API ==="
          curl -s -o /dev/null -w "Riksbanken API: %{http_code}\n" \
            "https://api.riksbank.se/swea/v1/observations/SECBREPOEFF/${MONTH_AGO}/${TODAY}" || true
          echo "=== Testar Finansportalen ==="
          curl -s -o /dev/null -w "Finansportalen: %{http_code}\n" \
            "https://www.finansportalen.se/bank/bolan/" || true
          echo "=== Testar Compricer ==="
          curl -s -o /dev/null -w "Compricer: %{http_code}\n" \
            "https://www.compricer.se/bolan/" || true

      - name: Samla in bankräntor
        run: python main.py collect
        continue-on-error: true

      # Backfill (365 dagar historik) körs bara vid manuell körning
      # – daglig collect hämtar redan de senaste 14 dagarna
      - name: Samla in historiska referensräntor (backfill)
        if: github.event_name == 'workflow_dispatch'
        run: python main.py backfill
        continue-on-error: true

      - name: Kör varningskontroller
        run: python main.py warnings
        continue-on-error: true

      - name: Exportera Excel-rapport
        run: python main.py export
        continue-on-error: true

      - name: Exportera data till CSV
        run: python scripts/export_csv.py
        continue-on-error: true

      # ── Spara databas ─────────────────────────────────────────────────────────
      - name: Komprimera databas
        run: |
          if [ -f data/borantor.db ]; then
            gzip -c data/borantor.db > data/borantor.db.gz
          fi

      # ── Committa data tillbaka ────────────────────────────────────────────────
      - name: Committa data
        run: |
          git config user.name  "Boränteagent"
          git config user.email "bot@borantor-agent"
          git add data/borantor.db.gz data/export/ || true
          if git diff --staged --quiet; then
            echo "Ingen ny data"
          else
            git commit -m "Data: daglig insamling $(date +%Y-%m-%d)"
            # Hämta eventuella kodändringar som pushats under körningen
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "${GITHUB_REF_NAME}"
          fi
